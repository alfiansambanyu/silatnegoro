<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SILAT NEGORO</title>

<style>

/* =====================
GLOBAL STYLE
===================== */

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:Segoe UI,Roboto,Arial;
background:linear-gradient(135deg,#4f8edc,#2a5fa4);
min-height:100vh;
color:#333;
}

/* =====================
HEADER
===================== */

header{
text-align:center;
color:white;
padding:30px 10px;
animation:fadeDown 1s;
}

header img{
height:120px;
margin-bottom:10px;
}

header h1{
font-size:24px;
margin:2px;
}

header p{
font-size:16px;
}

/* =====================
LAYOUT
===================== */

.container{
max-width:1000px;
margin:auto;
padding:10px;
}

/* =====================
CARD
===================== */

.card{
background:white;
border-radius:14px;
padding:25px;
margin-bottom:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
animation:fadeUp .7s;
}

/* =====================
TITLE
===================== */

.title{
font-size:20px;
font-weight:bold;
border-bottom:3px solid #3b82c4;
padding-bottom:6px;
margin-bottom:15px;
}

/* =====================
INPUT
===================== */

input{
width:100%;
padding:14px;
font-size:16px;
border-radius:8px;
border:1px solid #ccc;
}

input:focus{
outline:none;
border-color:#3b82c4;
box-shadow:0 0 5px rgba(0,0,0,0.2);
}

/* =====================
STAT DASHBOARD
===================== */

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:15px;
margin-bottom:20px;
}

.stat{
background:#f5f7fb;
border-radius:10px;
padding:15px;
text-align:center;
}

.stat h2{
font-size:28px;
color:#3b82c4;
}

.stat p{
font-size:12px;
}

/* =====================
RESULT
===================== */

.row{
margin-bottom:12px;
}

.label{
font-size:12px;
color:#777;
}

.value{
font-weight:bold;
margin-top:3px;
}

/* =====================
STATUS BADGE
===================== */

.status{
padding:6px 12px;
border-radius:20px;
font-size:13px;
font-weight:bold;
}

.Diterima{background:#e6e0ff;color:#4b0082;}
.Diproses{background:#fff3cd;color:#856404;}
.Selesai{background:#d4edda;color:#1e7e34;}
.PerluPerbaikan{background:#f8d7da;color:#721c24;}

/* =====================
TRACKING
===================== */

.tracking{
display:flex;
justify-content:space-between;
margin:30px 0;
position:relative;
}

.tracking::before{
content:'';
position:absolute;
top:18px;
left:0;
right:0;
height:4px;
background:#ddd;
z-index:0;
}

.step{
text-align:center;
flex:1;
position:relative;
z-index:1;
}

.circle{
width:35px;
height:35px;
border-radius:50%;
background:#ccc;
margin:auto;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-weight:bold;
}

.step.done .circle{background:#28a745;}
.step.active .circle{background:#3b82c4;animation:pulse 1.5s infinite;}
.step.error .circle{background:#dc3545;animation:shake .4s infinite alternate;}

.step p{
font-size:12px;
margin-top:5px;
}

/* =====================
LOADING
===================== */

.loading{
text-align:center;
padding:20px;
}

.spinner{
width:35px;
height:35px;
border:4px solid #ddd;
border-top:4px solid #3b82c4;
border-radius:50%;
animation:spin 1s linear infinite;
margin:auto;
}

/* =====================
BUTTON
===================== */

.form-btn a{
display:block;
background:#2e7d32;
color:white;
padding:14px;
border-radius:8px;
text-decoration:none;
text-align:center;
font-weight:bold;
}

.form-btn a:hover{
background:#1f5e24;
}

/* =====================
FOOTER
===================== */

footer{
text-align:center;
color:white;
font-size:12px;
margin-top:20px;
padding-bottom:20px;
}

/* =====================
ANIMATIONS
===================== */

@keyframes spin{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.1)}
100%{transform:scale(1)}
}

@keyframes shake{
0%{transform:translateX(-2px)}
100%{transform:translateX(2px)}
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(20px)}
to{opacity:1;transform:translateY(0)}
}

@keyframes fadeDown{
from{opacity:0;transform:translateY(-20px)}
to{opacity:1;transform:translateY(0)}
}

</style>
</head>

<body>

<header>

<img src="Logo-Kabupaten-Bojonegoro.png">

<h1>UPTD METROLOGI LEGAL</h1>
<h1>KABUPATEN BOJONEGORO</h1>

<p><b>SILAT NEGORO</b></p>
<p>Sistem Informasi Layanan Tera/Tera Ulang</p>

</header>

<div class="container">

<div class="card">

<div class="stats">

<div class="stat">
<h2 id="total">0</h2>
<p>Total Layanan</p>
</div>

<div class="stat">
<h2 id="proses">0</h2>
<p>Diproses</p>
</div>

<div class="stat">
<h2 id="selesai">0</h2>
<p>Selesai</p>
</div>

</div>

</div>

<div class="card">

<div class="title">Cek Status Layanan</div>

<input id="search" placeholder="Ketik Nomor Layanan...">

<div id="hasil"></div>

</div>

<div class="card form-btn">

<a href="https://forms.gle/xixjsguVMUgHeTwZ7">
Ajukan Permohonan Tera/Tera Ulang
</a>

</div>

</div>

<footer>
© 2026 Dinas Perdagangan, Koperasi dan Usaha Mikro Kabupaten Bojonegoro
</footer>

<script>

/* =====================
GOOGLE SHEET URL
===================== */

const sheetURL="https://docs.google.com/spreadsheets/d/e/2PACX-1vSabRsCKk4xRAHNzpX25t5Bs2JAA-w1l2sycvl4AIQaYTe7BFFwBjQTiyxReGp3jp10u1PAVHNEK2bu/pub?gid=1685468197&single=true&output=csv&t="+Date.now()

/* =====================
CSV PARSER
===================== */

function parseCSV(text){

const rows=text.split("\n").map(r=>r.split(","))
return rows

}

/* =====================
TRACKING UI
===================== */

function tracking(status){

status=status.toLowerCase()

let s1="",s2="",s3=""

if(status.includes("diterima")) s1="active"
if(status.includes("diproses")){s1="done";s2="active"}
if(status.includes("selesai")){s1="done";s2="done";s3="active"}
if(status.includes("perbaikan")){s1="done";s2="done";s3="error"}

return`

<div class="tracking">

<div class="step ${s1}">
<div class="circle">1</div>
<p>Diterima</p>
</div>

<div class="step ${s2}">
<div class="circle">2</div>
<p>Diproses</p>
</div>

<div class="step ${s3}">
<div class="circle">3</div>
<p>${status.includes("perbaikan")?"Perbaikan":"Selesai"}</p>
</div>

</div>

`

}

/* =====================
LOAD DATA
===================== */

async function loadData(){

const res=await fetch(sheetURL)
const text=await res.text()
const data=parseCSV(text)

let total=data.length-1
let proses=0
let selesai=0

for(let i=1;i<data.length;i++){

let status=(data[i][6]||"").toLowerCase()

if(status.includes("diproses")) proses++
if(status.includes("selesai")) selesai++

}

document.getElementById("total").innerText=total
document.getElementById("proses").innerText=proses
document.getElementById("selesai").innerText=selesai

return data

}

/* =====================
SEARCH SYSTEM
===================== */

let sheetData=[]

document.getElementById("search").addEventListener("input",function(){

const val=this.value.toLowerCase()

if(val.length<3){
document.getElementById("hasil").innerHTML=""
return
}

for(let i=1;i<sheetData.length;i++){

let nomor=(sheetData[i][0]||"").toLowerCase()

if(nomor.includes(val)){

let status=sheetData[i][6]
let statusClass=status.replace(/\s/g,'')

document.getElementById("hasil").innerHTML=`

<div class="row">
<div class="label">Nomor Layanan</div>
<div class="value">${sheetData[i][0]}</div>
</div>

<div class="row">
<div class="label">Jenis Layanan</div>
<div class="value">${sheetData[i][5]}</div>
</div>

<div class="row">
<div class="label">Status</div>
<div class="value">
<span class="status ${statusClass}">${status}</span>
</div>
</div>

${tracking(status)}

<div class="row">
<div class="label">Jadwal Pengujian</div>
<div class="value">${sheetData[i][2]}</div>
</div>

<div class="row">
<div class="label">Lokasi</div>
<div class="value">${sheetData[i][4]}</div>
</div>

<div class="row">
<div class="label">Keterangan</div>
<div class="value">${sheetData[i][7]}</div>
</div>

`

break

}

}

})

/* =====================
INIT
===================== */

async function init(){

sheetData=await loadData()

}

init()

</script>

</body>
</html>
