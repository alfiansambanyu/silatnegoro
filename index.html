<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SILAT NEGORO</title>

<style>

*{box-sizing:border-box;margin:0;padding:0}

body{
font-family:Segoe UI,Arial;
background:linear-gradient(135deg,#4f8edc,#2a5fa4);
min-height:100vh;
color:#333;
}

/* HEADER */

header{
text-align:center;
color:white;
padding:30px 10px;
}

header img{
height:150px;
margin-bottom:10px;
}

/* CONTAINER */

.container{
max-width:900px;
margin:auto;
padding:10px;
}

/* CARD */

.card{
background:white;
border-radius:14px;
padding:25px;
margin-bottom:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

.title{
font-size:20px;
font-weight:bold;
border-bottom:3px solid #3b82c4;
padding-bottom:6px;
margin-bottom:15px;
}

/* INPUT */

input{
width:100%;
padding:14px;
font-size:16px;
border-radius:8px;
border:1px solid #ccc;
margin-bottom:10px;
}

button{
width:100%;
padding:14px;
background:#3b82c4;
border:none;
border-radius:8px;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

/* RESULT */

.row{margin-bottom:12px}

.label{
font-size:12px;
color:#777;
}

.value{
font-weight:bold;
margin-top:3px;
}

/* TRACKING */

.tracking{
margin:40px 0;
position:relative;
}

.progress-line{
position:absolute;
top:30px;
left:0;
right:0;
height:6px;
background:#ddd;
}

.progress{
position:absolute;
top:30px;
left:0;
height:6px;
background:#4cbb17;
transition:0.5s;
}

.steps{
display:flex;
justify-content:space-between;
position:relative;
}

.step{
text-align:center;
width:33%;
}

.circle{
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
margin:auto;
font-size:26px;
color:white;
font-weight:bold;
}

.label-step{
margin-top:8px;
font-weight:bold;
font-size:14px;
}

/* STATUS COLORS */

.diterima{background:#e6cff2;color:#000}
.proses{background:#fffc00;color:#000}
.selesai{background:#4cbb17}
.perbaikan{background:#ff0800}

/* ACTIVE */

.active{
animation:pulse 1.4s infinite;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.2)}
100%{transform:scale(1)}
}

/* BUTTON FORM */

.form-btn a{
display:block;
background:#2e7d32;
color:white;
padding:14px;
border-radius:8px;
text-decoration:none;
text-align:center;
font-weight:bold;
}

/* FOOTER */

footer{
text-align:center;
color:white;
font-size:12px;
margin-top:20px;
padding-bottom:20px;
}

</style>
</head>

<body>

<header>

<img src="Logo-Kabupaten-Bojonegoro.png">

<h2>UPTD METROLOGI LEGAL KABUPATEN BOJONEGORO</h2>

<p><b>SILAT NEGORO</b></p>
<p>Sistem Informasi Layanan Tera/Tera Ulang</p>

</header>

<div class="container">

<div class="card">

<div class="title">Cek Status Layanan</div>

<input id="search" placeholder="Masukkan Nomor Layanan">

<button onclick="cekLayanan()">Cari Status</button>

<div id="hasil"></div>

</div>

<div class="card form-btn">

<a href="https://forms.gle/xixjsguVMUgHeTwZ7">
Ajukan Permohonan Tera/Tera Ulang
</a>

</div>

</div>

<footer>
© 2026 Dinas Perdagangan Koperasi dan Usaha Mikro Kabupaten Bojonegoro
</footer>

<script>

let sheetData=[]

const sheetURL="https://docs.google.com/spreadsheets/d/e/2PACX-1vSabRsCKk4xRAHNzpX25t5Bs2JAA-w1l2sycvl4AIQaYTe7BFFwBjQTiyxReGp3jp10u1PAVHNEK2bu/pub?gid=1685468197&single=true&output=csv&t="+Date.now()

function parseCSV(text){
return text.split("\n").map(r=>r.split(","))
}

/* ENTER SEARCH */

document.getElementById("search").addEventListener("keypress",function(e){
if(e.key==="Enter"){cekLayanan()}
})

/* WORKFLOW */

function workflow(status){

status=status.toLowerCase()

let progress="0%"

let s1="circle diterima"
let s2="circle proses"
let s3="circle selesai"

let icon1="1"
let icon2="2"
let icon3="3"

let label3="Selesai"

/* DITERIMA */

if(status.includes("diterima")){
progress="15%"
icon1="⏳"
s1+=" active"
}

/* DIPROSES */

if(status.includes("diproses")){
progress="60%"
icon1="✔"
icon2="⏳"
s2+=" active"
}

/* SELESAI */

if(status.includes("selesai")){
progress="100%"
icon1="✔"
icon2="✔"
icon3="✔"
}

/* PERLU PERBAIKAN */

if(status.includes("perbaikan")){
progress="100%"
icon1="✔"
icon2="✔"
icon3="⚠"
s3="circle perbaikan active"
label3="Perlu Perbaikan"
}

return`

<div class="tracking">

<div class="progress-line"></div>
<div class="progress" style="width:${progress}"></div>

<div class="steps">

<div class="step">
<div class="${s1}">${icon1}</div>
<div class="label-step">Diterima</div>
</div>

<div class="step">
<div class="${s2}">${icon2}</div>
<div class="label-step">Diproses</div>
</div>

<div class="step">
<div class="${s3}">${icon3}</div>
<div class="label-step">${label3}</div>
</div>

</div>

</div>

`
}

/* LOAD DATA */

async function init(){

const res=await fetch(sheetURL)
const text=await res.text()

sheetData=parseCSV(text)

}

/* SEARCH */

function cekLayanan(){

let val=document.getElementById("search").value.toLowerCase()
let hasil=document.getElementById("hasil")

for(let i=1;i<sheetData.length;i++){

let nomor=(sheetData[i][0]||"").toLowerCase()

if(nomor.includes(val)){

let status=sheetData[i][6]

hasil.innerHTML=`

<div class="row">
<div class="label">Nomor Layanan</div>
<div class="value">${sheetData[i][0]}</div>
</div>

<div class="row">
<div class="label">Jenis Layanan</div>
<div class="value">${sheetData[i][5]}</div>
</div>

<div class="row">
<div class="label">Status</div>
<div class="value">${status}</div>
</div>

${workflow(status)}

<div class="row">
<div class="label">Jadwal Pengujian</div>
<div class="value">${sheetData[i][2]}</div>
</div>

<div class="row">
<div class="label">Lokasi</div>
<div class="value">${sheetData[i][4]}</div>
</div>

<div class="row">
<div class="label">Keterangan</div>
<div class="value">${sheetData[i][7]}</div>
</div>

`

return
}

}

hasil.innerHTML="<b>Nomor layanan tidak ditemukan</b>"

}

init()

</script>

</body>
</html>
