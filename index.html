<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SILAT NEGORO</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Segoe UI,Roboto,Arial;
background:linear-gradient(135deg,#5aa9e6,#3b82c4);
min-height:100vh;
color:#333;
}

/* HEADER */

header{
text-align:center;
padding:30px 10px;
color:white;
animation:fadeDown 1s;
}

header img{
height:150px;
margin-bottom:10px;
}

header h1{
margin:2px;
font-size:25px;
}

header p{
margin-top:5px;
font-size:18px;
}

/* CARD */

.card{
background:white;
max-width:520px;
margin:auto;
border-radius:14px;
padding:25px;
box-shadow:0 15px 35px rgba(0,0,0,0.2);
margin-bottom:20px;
animation:fadeUp 0.8s;
}

/* TITLE */

.title{
font-size:22px;
font-weight:bold;
margin-bottom:10px;
border-bottom:3px solid #3b82c4;
padding-bottom:6px;
}

/* INPUT */

input{
width:100%;
padding:14px;
font-size:16px;
border-radius:8px;
border:1px solid #ccc;
margin-top:10px;
transition:0.3s;
}

input:focus{
border-color:#3b82c4;
outline:none;
box-shadow:0 0 8px rgba(59,130,196,0.3);
}

/* BUTTON */

button{
width:100%;
padding:14px;
margin-top:12px;
border:none;
border-radius:8px;
background:#3b82c4;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#2a6da8;
transform:translateY(-2px);
}

/* RESULT */

#hasil{
margin-top:20px;
display:none;
}

/* RESULT CARD */

.resultCard{
background:#f8fafc;
border-radius:10px;
padding:15px;
margin-bottom:15px;
animation:fadeUp 0.5s;
border:1px solid #e2e8f0;
}

/* INFO ROW */

.row{
margin-bottom:10px;
}

.label{
font-size:12px;
color:#666;
}

.value{
font-size:15px;
font-weight:bold;
margin-top:3px;
}

/* STATUS BADGE */

.status{
display:inline-block;
padding:6px 12px;
border-radius:20px;
font-size:13px;
font-weight:bold;
animation:pulse 1.5s infinite;
}

.Diterima{
background:#e6e0ff;
color:#4b0082;
}

.Selesai{
background:#d4edda;
color:#1e7e34;
}

.Diproses{
background:#fff3cd;
color:#856404;
}

.PerluPerbaikan{
background:#f8d7da;
color:#721c24;
}

/* LOADING */

.loading{
text-align:center;
padding:20px;
}

.spinner{
width:35px;
height:35px;
border:4px solid #ddd;
border-top:4px solid #3b82c4;
border-radius:50%;
animation:spin 1s linear infinite;
margin:auto;
}

/* FORM BUTTON */

.form-btn{
text-align:center;
}

.form-btn a{
display:block;
background:#2e7d32;
color:white;
padding:15px;
border-radius:10px;
text-decoration:none;
font-weight:bold;
transition:0.3s;
}

.form-btn a:hover{
background:#1f5e24;
transform:translateY(-2px);
}

/* FOOTER */

footer{
text-align:center;
color:white;
font-size:12px;
margin-top:20px;
padding-bottom:20px;
}

/* ANIMATIONS */

@keyframes spin{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(20px)}
to{opacity:1;transform:translateY(0)}
}

@keyframes fadeDown{
from{opacity:0;transform:translateY(-20px)}
to{opacity:1;transform:translateY(0)}
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.05)}
100%{transform:scale(1)}
}

</style>
</head>

<body>

<header>

<img src="Logo-Kabupaten-Bojonegoro.png">

<h1>UPTD METROLOGI LEGAL</h1>
<h1>KABUPATEN BOJONEGORO</h1>

<p><b>SILAT NEGORO</b></p>
<p>(Sistem Informasi Layanan Tera/Tera Ulang)</p>

</header>

<div class="card">

<div class="title">Cek Status Layanan</div>

<input id="nomor" placeholder="Masukkan Nomor Layanan">

<button onclick="cekLayanan()">Cari Status</button>

<div id="hasil"></div>

</div>

<div class="card form-btn">

<a href="https://forms.gle/xixjsguVMUgHeTwZ7">
Ajukan Permohonan Tera/Tera Ulang
</a>

</div>

<footer>
© 2026 Dinas Perdagangan, Koperasi dan Usaha Mikro Kabupaten Bojonegoro
</footer>

<script>

function parseCSV(text){

const rows=[]
let row=[]
let current=""
let insideQuotes=false

for(let i=0;i<text.length;i++){

const char=text[i]
const next=text[i+1]

if(char=='"' && insideQuotes && next=='"'){
current+='"'
i++
}

else if(char=='"'){
insideQuotes=!insideQuotes
}

else if(char=="," && !insideQuotes){
row.push(current)
current=""
}

else if(char=="\n" && !insideQuotes){
row.push(current)
rows.push(row)
row=[]
current=""
}

else{
current+=char
}

}

row.push(current)
rows.push(row)

return rows

}

async function cekLayanan(){

const nomor=document.getElementById("nomor").value.trim().toLowerCase()

const hasil=document.getElementById("hasil")

if(!nomor){
alert("Nomor layanan harus diisi")
return
}

hasil.style.display="block"

hasil.innerHTML=`
<div class="loading">
<div class="spinner"></div>
<p>Mencari data...</p>
</div>
`

const url="https://docs.google.com/spreadsheets/d/e/2PACX-1vSabRsCKk4xRAHNzpX25t5Bs2JAA-w1l2sycvl4AIQaYTe7BFFwBjQTiyxReGp3jp10u1PAVHNEK2bu/pub?gid=1685468197&single=true&output=csv"

const res=await fetch(url)
const text=await res.text()
const data=parseCSV(text)

const hasilFilter=data.slice(1).filter(r =>
(r[0]||"").toLowerCase().includes(nomor)
)

if(hasilFilter.length===0){

hasil.innerHTML="<b>Nomor layanan tidak ditemukan</b>"
return

}

let html=""

hasilFilter.forEach(row=>{

let statusClass=(row[6]||"").replace(/\s/g,'')

html+=`

<div class="resultCard">

<div class="row">
<div class="label">Nomor Layanan</div>
<div class="value">${row[0]}</div>
</div>

<div class="row">
<div class="label">Jenis Layanan</div>
<div class="value">${row[5]}</div>
</div>

<div class="row">
<div class="label">Status</div>
<div class="value">
<span class="status ${statusClass}">${row[6]}</span>
</div>
</div>

<div class="row">
<div class="label">Jadwal Pengujian</div>
<div class="value">${row[2]}</div>
</div>

<div class="row">
<div class="label">Tanggal Diterima</div>
<div class="value">${row[1]}</div>
</div>

<div class="row">
<div class="label">Lokasi</div>
<div class="value">${row[4]}</div>
</div>

<div class="row">
<div class="label">Keterangan</div>
<div class="value">${row[7]}</div>
</div>

</div>

`

})

hasil.innerHTML=html

}

document.getElementById("nomor").addEventListener("keydown",function(e){
if(e.key==="Enter"){
cekLayanan()
}
})

</script>

</body>
</html>
