<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Form Input Layanan Tera</title>

<style>

body{
font-family:Arial, Helvetica, sans-serif;
background:#f2f5f9;
margin:0;
padding:40px;
}

.container{
max-width:500px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
}

h2{
text-align:center;
margin-bottom:20px;
}

label{
font-weight:bold;
}

input,select{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:6px;
}

button{
width:100%;
padding:12px;
border:none;
background:#2d89ef;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#1b5fbf;
}

#status{
text-align:center;
margin-top:15px;
font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h2>Form Pengajuan Layanan</h2>

<label>Nama Pemilik</label>
<input type="text" id="nama" required>

<label>Nomor UTTP</label>
<input type="text" id="uttp" required>

<label>Jenis Layanan</label>
<select id="layanan">
<option value="">Pilih Layanan</option>
<option value="Tera">Tera</option>
<option value="Tera Ulang">Tera Ulang</option>
<option value="Pengaduan">Pengaduan</option>
</select>

<button onclick="kirimData()">Kirim Data</button>

<p id="status"></p>

</div>

<script>

function kirimData(){

const url="https://script.googleusercontent.com/macros/echo?user_content_key=AY5xjrSR2IOrnmHE_wSjbPAh6R6hCHNZF3ti6jEXmN5LDjfTo-OIqJbCuaKOyaj-aSvtf2l5vttIO_yOzYehzUymdiECxxtS_RSTXDElR3kVT34bPrchJiriGpMKxqFOCl90aztqwqlubRX72rwUTyTfb9F4jwe-4nRr1aFfKILIS_X90Kk-FejhHBkb6B67tAOV7tu8MqgB0vOmVvTqQU_-rOiA2o9lUI7trPmCeCJMNzeBZ7Jzf4cGRsNoxhZR0_YoZ6Cro4Jv3QfSSQcKy__2urGEMTPHZgE-ENYZivEk&lib=Mx6-EdlwqnGxSbCwNLXC5btGdcM6ZsAap";

const data={
nama:document.getElementById("nama").value,
uttp:document.getElementById("uttp").value,
layanan:document.getElementById("layanan").value
};

fetch(url,{
method:"POST",
body:JSON.stringify(data)
})
.then(res=>res.json())
.then(response=>{
document.getElementById("status").innerHTML="✅ Data berhasil dikirim";
})
.catch(error=>{
document.getElementById("status").innerHTML="❌ Gagal mengirim data";
});

}

</script>

</body>
</html>
