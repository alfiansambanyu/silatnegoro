<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SILAT NEGORO</title>

<style>

*{box-sizing:border-box;}

body{
margin:0;
font-family:Segoe UI,Roboto,Arial;
background:linear-gradient(135deg,#5aa9e6,#3b82c4);
min-height:100vh;
color:#333;
}

/* HEADER */

header{
text-align:center;
padding:30px 10px;
color:white;
}

header img{
height:130px;
margin-bottom:10px;
}

header h1{
margin:3px;
font-size:24px;
}

header p{
margin:4px;
font-size:16px;
}

/* CARD */

.card{
background:white;
max-width:520px;
margin:auto;
border-radius:14px;
padding:25px;
box-shadow:0 15px 35px rgba(0,0,0,0.2);
margin-bottom:20px;
animation:fadeUp 0.7s;
}

/* TITLE */

.title{
font-size:20px;
font-weight:bold;
margin-bottom:10px;
border-bottom:3px solid #3b82c4;
padding-bottom:6px;
}

/* INPUT */

input{
width:100%;
padding:14px;
font-size:16px;
border-radius:8px;
border:1px solid #ccc;
margin-top:10px;
}

input:focus{
border-color:#3b82c4;
outline:none;
}

/* BUTTON */

button{
width:100%;
padding:14px;
margin-top:12px;
border:none;
border-radius:8px;
background:#3b82c4;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#2a6da8;
}

/* RESULT */

#hasil{
margin-top:20px;
display:none;
}

/* INFO ROW */

.row{
margin-bottom:12px;
}

.label{
font-size:12px;
color:#666;
}

.value{
font-size:15px;
font-weight:bold;
margin-top:3px;
}

/* STATUS BADGE */

.status{
display:inline-block;
padding:6px 12px;
border-radius:20px;
font-size:13px;
font-weight:bold;
}

.Diterima{background:#e6e0ff;color:#4b0082;}
.Selesai{background:#d4edda;color:#1e7e34;}
.Diproses{background:#fff3cd;color:#856404;}
.PerluPerbaikan{background:#f8d7da;color:#721c24;}

/* TRACKING */

.tracking{
display:flex;
justify-content:space-between;
margin:30px 0;
position:relative;
}

.tracking::before{
content:'';
position:absolute;
top:20px;
left:0;
right:0;
height:4px;
background:#ddd;
z-index:0;
}

.step{
text-align:center;
flex:1;
position:relative;
z-index:1;
}

.circle{
width:40px;
height:40px;
border-radius:50%;
background:#ccc;
margin:auto;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-weight:bold;
}

.step.active .circle{
background:#3b82c4;
animation:pulse 1.5s infinite;
}

.step.done .circle{
background:#28a745;
}

.step.error .circle{
background:#dc3545;
animation:shake 0.4s infinite alternate;
}

.step p{
font-size:12px;
margin-top:6px;
}

/* LOADING */

.loading{
text-align:center;
padding:20px;
}

.spinner{
width:35px;
height:35px;
border:4px solid #ddd;
border-top:4px solid #3b82c4;
border-radius:50%;
animation:spin 1s linear infinite;
margin:auto;
}

/* FORM BUTTON */

.form-btn{
text-align:center;
}

.form-btn a{
display:block;
background:#2e7d32;
color:white;
padding:15px;
border-radius:10px;
text-decoration:none;
font-weight:bold;
}

.form-btn a:hover{
background:#1f5e24;
}

/* FOOTER */

footer{
text-align:center;
color:white;
font-size:12px;
margin-top:20px;
padding-bottom:20px;
}

/* ANIMATIONS */

@keyframes spin{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.1)}
100%{transform:scale(1)}
}

@keyframes shake{
0%{transform:translateX(-2px)}
100%{transform:translateX(2px)}
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(20px)}
to{opacity:1;transform:translateY(0)}
}

</style>
</head>

<body>

<header>

<img src="Logo-Kabupaten-Bojonegoro.png">

<h1>UPTD METROLOGI LEGAL KABUPATEN BOJONEGORO</h1>

<p><b>SILAT NEGORO</b></p>
<p>(Sistem Informasi Layanan Tera/Tera Ulang)</p>

</header>

<div class="card">

<div class="title">Cek Status Layanan</div>

<input id="nomor" placeholder="Masukkan Nomor Layanan">

<button onclick="cekLayanan()">Cari Status</button>

<div id="hasil"></div>

</div>

<div class="card form-btn">

<a href="https://forms.gle/xixjsguVMUgHeTwZ7">
Ajukan Permohonan Tera/Tera Ulang
</a>

</div>

<footer>
© 2026 Dinas Perdagangan, Koperasi dan Usaha Mikro Kabupaten Bojonegoro
</footer>

<script>

function parseCSV(text){

const rows=[]
let row=[]
let current=""
let insideQuotes=false

for(let i=0;i<text.length;i++){

const char=text[i]
const next=text[i+1]

if(char=='"' && insideQuotes && next=='"'){
current+='"'
i++
}

else if(char=='"'){
insideQuotes=!insideQuotes
}

else if(char=="," && !insideQuotes){
row.push(current)
current=""
}

else if(char=="\n" && !insideQuotes){
row.push(current)
rows.push(row)
row=[]
current=""
}

else{
current+=char
}

}

row.push(current)
rows.push(row)

return rows

}

function buatTracking(status){

status=status.toLowerCase()

let s1="",s2="",s3=""

if(status.includes("diterima")) s1="active"
if(status.includes("diproses")){s1="done";s2="active"}
if(status.includes("selesai")){s1="done";s2="done";s3="active"}
if(status.includes("perbaikan")){s1="done";s2="done";s3="error"}

return `

<div class="tracking">

<div class="step ${s1}">
<div class="circle">1</div>
<p>Diterima</p>
</div>

<div class="step ${s2}">
<div class="circle">2</div>
<p>Diproses</p>
</div>

<div class="step ${s3}">
<div class="circle">3</div>
<p>${status.includes("perbaikan") ? "Perbaikan" : "Selesai"}</p>
</div>

</div>

`

}

async function cekLayanan(){

const nomor=document.getElementById("nomor").value.trim().toLowerCase()

const hasil=document.getElementById("hasil")

if(!nomor){
alert("Nomor layanan harus diisi")
return
}

hasil.style.display="block"

hasil.innerHTML=`
<div class="loading">
<div class="spinner"></div>
<p>Mencari data...</p>
</div>
`

const url="https://docs.google.com/spreadsheets/d/e/2PACX-1vSabRsCKk4xRAHNzpX25t5Bs2JAA-w1l2sycvl4AIQaYTe7BFFwBjQTiyxReGp3jp10u1PAVHNEK2bu/pub?gid=1685468197&single=true&output=csv&t="+Date.now()

const res=await fetch(url)
const text=await res.text()
const data=parseCSV(text)

let ditemukan=false

for(let i=1;i<data.length;i++){

let nomorSheet=(data[i][0]||"").toLowerCase()

if(nomorSheet.includes(nomor)){

let status=data[i][6]
let statusClass=status.replace(/\s/g,'')

hasil.innerHTML=`

<div class="row">
<div class="label">Nomor Layanan</div>
<div class="value">${data[i][0]}</div>
</div>

<div class="row">
<div class="label">Jenis Layanan</div>
<div class="value">${data[i][5]}</div>
</div>

<div class="row">
<div class="label">Status</div>
<div class="value">
<span class="status ${statusClass}">${status}</span>
</div>
</div>

${buatTracking(status)}

<div class="row">
<div class="label">Jadwal Pengujian</div>
<div class="value">${data[i][2]}</div>
</div>

<div class="row">
<div class="label">Tanggal Diterima</div>
<div class="value">${data[i][1]}</div>
</div>

<div class="row">
<div class="label">Lokasi</div>
<div class="value">${data[i][4]}</div>
</div>

<div class="row">
<div class="label">Keterangan</div>
<div class="value">${data[i][7]}</div>
</div>

`

ditemukan=true
break

}

}

if(!ditemukan){
hasil.innerHTML="<b>Nomor layanan tidak ditemukan</b>"
}

}

document.getElementById("nomor").addEventListener("keydown",function(e){
if(e.key==="Enter"){
cekLayanan()
}
})

</script>

</body>
</html>
